---
# Service Account for running privileged containers
apiVersion: v1
kind: ServiceAccount
metadata:
  name: nucleus-dind-sa
  namespace: hacohen-omniverse
---
# Role to allow reading service status (for LoadBalancer hostname)
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: nucleus-service-reader
  namespace: hacohen-omniverse
rules:
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["get", "list"]
---
# Bind the role to the service account
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: nucleus-service-reader-binding
  namespace: hacohen-omniverse
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: nucleus-service-reader
subjects:
  - kind: ServiceAccount
    name: nucleus-dind-sa
    namespace: hacohen-omniverse
---
# Role binding to allow privileged containers
# NOTE: This requires cluster-admin to apply
# Run: oc adm policy add-scc-to-user privileged -z nucleus-dind-sa -n hacohen-omniverse
